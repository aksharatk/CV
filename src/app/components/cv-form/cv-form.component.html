<h2>Add CV</h2>

<form [formGroup]="cvForm" (ngSubmit)="onSubmit()">

  <!-- Top Row -->
  <div class="top-row">
    <input formControlName="name" placeholder="Name">
    <input formControlName="email" placeholder="Email">
    <input formControlName="phone" placeholder="Phone">
  </div>

  <!-- Summary Row -->
  <div class="summary-row">
    <textarea formControlName="summary" placeholder="Professional Summary"></textarea>
  </div>

  <!-- EXPERIENCE -->
  <h3>Experience</h3>
  <button type="button" (click)="addExperience()">Add Experience</button>

  <div formArrayName="experience" *ngFor="let exp of experience.controls; let i=index">
    <div [formGroupName]="i" class="card">
      <input formControlName="company" placeholder="Company">
      <input formControlName="role" placeholder="Role">
      <input formControlName="start_date" type="date">
      <input formControlName="end_date" type="date">
      <textarea formControlName="description" placeholder="Description"></textarea>
    </div>
  </div>

  <!-- EDUCATION -->
  <h3>Education</h3>
  <button type="button" (click)="addEducation()">Add Education</button>

  <div formArrayName="education" *ngFor="let edu of education.controls; let i=index">
    <div [formGroupName]="i" class="card">
      <input formControlName="institution" placeholder="Institution">
      <input formControlName="degree" placeholder="Degree">
      <input formControlName="start_date" type="date">
      <input formControlName="end_date" type="date">
    </div>
  </div>

  <!-- SKILLS -->
  <h3>Skills</h3>
  <button type="button" (click)="addSkill()">Add Skill</button>

  <div formArrayName="skills" *ngFor="let skill of skills.controls; let i=index">
    <input [formControlName]="i" placeholder="Skill">
  </div>

  <button type="submit" class="save-btn">Save CV</button>

</form>
